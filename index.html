<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X — Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==================== APP CONTAINER ==================== -->
  <div class="app">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-inner">

        <!-- Logo -->
        <div class="logo">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="#fff">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231z"/>
          </svg>
        </div>

        <!-- Main Navigation -->
        <nav class="nav">
          <a href="#" class="nav-item active" data-view="home">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 3.75l7.5 6.5v10.25h-5.25v-6h-4.5v6H4.5V10.25l7.5-6.5z"/></svg>
            <span>Home</span>
          </a>
          <a href="#" class="nav-item" data-view="explore">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
            <span>Explore</span>
          </a>
          <a href="#" class="nav-item" data-view="notifications">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span>Notifications</span>
          </a>
          <a href="#" class="nav-item" data-view="profile">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"/></svg>
            <span>Profile</span>
          </a>
        </nav>

        <!-- Post Button -->
        <button class="chirp-btn" id="openCompose">
          Post
        </button>

        <!-- Current User Quick Profile -->
        <div class="me-card" id="sidebarProfile">
          <img id="sidebarAvatar" src="https://i.pravatar.cc/48?img=12" class="avatar" alt="Your profile picture">
          <div class="me-meta">
            <strong id="sidebarName">Lerato M.</strong>
            <span id="sidebarHandle">@lerato_codes</span>
          </div>
        </div>

      </div>
    </aside>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main" id="mainContent">

      <!-- HOME VIEW -->
      <section class="view active" id="view-home">
        <header class="main-header">
          <h1>Home</h1>
        </header>

        <!-- Composer -->
        <div class="composer" id="inlineComposer">
          <img src="https://i.pravatar.cc/48?img=12" class="avatar" alt="Your avatar">
          <div class="composer-content">
            <textarea id="inlineText" placeholder="What is happening?!" rows="2"></textarea>

            <div class="composer-actions">
              <div class="composer-icons">
                <button class="image-btn" title="Add image">🖼️</button>
              </div>
              <button class="post-btn" id="inlinePostBtn" disabled>Post</button>
            </div>
          </div>
        </div>

        <!-- Feed -->
        <div class="feed" id="feed">
          <!-- Tweets will be injected here by JavaScript -->
        </div>
      </section>

      <!-- EXPLORE VIEW -->
      <section class="view hidden" id="view-explore">
        <header class="main-header">
          <h1>Explore</h1>
        </header>

        <div class="explore-content">
          <div class="search-box">
            <input type="text" id="exploreSearch" placeholder="Search X">
          </div>

          <div class="explore-tabs">
            <button class="explore-tab active" data-filter="all">For you</button>
            <button class="explore-tab" data-filter="tech">Tech</button>
            <button class="explore-tab" data-filter="sport">Sport</button>
            <button class="explore-tab" data-filter="news">News</button>
          </div>

          <div id="exploreResults">
            <!-- Search results will appear here -->
          </div>
        </div>
      </section>

      <!-- NOTIFICATIONS VIEW -->
      <section class="view hidden" id="view-notifications">
        <header class="main-header">
          <h1>Notifications</h1>
        </header>
        <div class="notifications-list" id="notificationsList">
          <!-- Notifications will be injected here -->
        </div>
      </section>

      <!-- PROFILE VIEW -->
      <section class="view hidden" id="view-profile">
        <div class="profile-header">
          <img src="https://picsum.photos/id/1018/1200/300" class="profile-banner" alt="Profile banner">
          <div class="profile-avatar-container">
            <img id="profileAvatar" src="https://i.pravatar.cc/120?img=12" class="profile-avatar" alt="Profile picture">
          </div>
        </div>

        <div class="profile-info">
          <div class="profile-header-info">
            <div>
              <h2 id="profileName">Lerato M.</h2>
              <span id="profileHandle">@lerato_codes</span>
            </div>
            <button class="edit-profile-btn" id="editProfileBtn">Edit profile</button>
          </div>

          <p id="profileBio">Frontend developer & coffee enthusiast ☕</p>

          <div class="profile-meta">
            <span>📍 <span id="profileLocation">Johannesburg, South Africa</span></span>
            <span>🔗 <a id="profileWebsite" href="#" target="_blank">lerato.dev</a></span>
            <span>📅 Joined <span id="profileJoinDate">March 2024</span></span>
          </div>

          <div class="profile-stats">
            <span><strong id="profileFollowing">387</strong> Following</span>
            <span><strong id="profileFollowers">1,240</strong> Followers</span>
          </div>
        </div>
      </section>

    </main>

    <!-- RIGHT SIDEBAR -->
    <aside class="right-sidebar">
      <div class="search-box">
        <input type="text" placeholder="Search X" id="searchInput">
      </div>

      <div class="panel">
        <h2>Trending now</h2>
        <div id="trends"></div>
      </div>

      <div class="panel">
        <h2>Who to follow</h2>
        <div id="followList"></div>
      </div>
    </aside>

  </div>

  <!-- ==================== COMPOSE MODAL ==================== -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <button class="modal-close" id="closeModal">✕</button>
      </div>

      <div class="modal-body">
        <img src="https://i.pravatar.cc/48?img=12" class="avatar" alt="Your avatar">

        <div>
          <textarea id="modalText" placeholder="What is happening?!" rows="6"></textarea>
          <div id="modalImagePreview" class="image-preview-container"></div>
        </div>
      </div>

      <div class="modal-footer">
        <div class="composer-icons">
          <button class="image-btn" title="Add image">🖼️</button>
          <button title="Create poll">📊</button>
          <button title="Add emoji">😊</button>
        </div>

        <div class="modal-footer-right">
          <span class="char-count" id="charCount">280</span>
          <button class="post-btn" id="modalPostBtn" disabled>Post</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast hidden" id="toast"></div>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-nav">
    <a href="#" data-view="home">🏠</a>
    <a href="#" data-view="explore">🔍</a>
    <a href="#" data-view="notifications">🔔</a>
    <a href="#" data-view="profile">👤</a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
