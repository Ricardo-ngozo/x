<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chirp — home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-inner">
      <a class="logo" href="#" data-nav="home" aria-label="chirp home">
        <svg viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M12 2c-3 0-5 2.2-5 5.2 0 1.6.7 2.9 1.7 3.9C5.6 12.4 3 15.7 3 20h2c0-3.9 2.6-6.6 5.4-7.4.5-.1 1-.5 1-1.1V10c-1.7-.2-3-1.6-3-3.3C8.4 4.9 10 3.4 12 3.4s3.6 1.5 3.6 3.3c0 1.7-1.3 3.1-3 3.3v1.5c0 .6.5 1 1 1.1 2.8.8 5.4 3.5 5.4 7.4h2c0-4.3-2.6-7.6-5.7-8.9 1-.9 1.7-2.3 1.7-3.9C17 4.2 15 2 12 2z"/></svg>
      </a>

      <nav class="nav">
        <a href="#" class="nav-item active" data-nav="home">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3l9-8z"/></svg>
          <span>Home</span>
        </a>
        <a href="#" class="nav-item" data-nav="explore">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 2a10 10 0 100 20 10 10 0 000-20zm3.5 6.5l-2 5.5-5.5 2 2-5.5z"/></svg>
          <span>Explore</span>
        </a>
        <a href="#" class="nav-item" data-nav="notifications">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 2a6 6 0 00-6 6v3.6c0 .8-.3 1.5-.8 2.1L4 16h16l-1.2-2.3c-.5-.6-.8-1.3-.8-2.1V8a6 6 0 00-6-6zm0 20a2.5 2.5 0 002.5-2.5h-5A2.5 2.5 0 0012 22z"/></svg>
          <span>Notifications</span>
        </a>
        <a href="#" class="nav-item" data-nav="messages">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3 4h18a1 1 0 011 1v14a1 1 0 01-1 1H3a1 1 0 01-1-1V5a1 1 0 011-1zm1 2.4V18h16V6.4l-7.4 5.5a1 1 0 01-1.2 0L4 6.4z"/></svg>
          <span>Messages</span>
        </a>
        <a href="#" class="nav-item" data-nav="bookmarks">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M6 2h12a1 1 0 011 1v19l-7-4-7 4V3a1 1 0 011-1z"/></svg>
          <span>Bookmarks</span>
        </a>
        <a href="#" class="nav-item" data-nav="profile">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-4.4 0-8 2.7-8 6v1h16v-1c0-3.3-3.6-6-8-6z"/></svg>
          <span>Profile</span>
        </a>
        <button class="nav-item theme-toggle" id="themeToggle" aria-pressed="false">
          <svg class="icon-sun" viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 4V2m0 20v-2M4 12H2m20 0h-2M5.6 5.6L4.2 4.2m15.6 1.4l1.4-1.4M5.6 18.4l-1.4 1.4m15.6-1.4l1.4 1.4M12 7a5 5 0 100 10 5 5 0 000-10z"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="24" height="24" hidden><path fill="currentColor" d="M20.7 14.9A9 9 0 119.1 3.3a7 7 0 1011.6 11.6z"/></svg>
          <span class="toggle-label">Dark mode</span>
        </button>
      </nav>

      <button class="chirp-btn" id="openComposeModal">
        <span class="chirp-btn-full">Chirp</span>
        <svg class="chirp-btn-icon" viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>

      <div class="me-card">
        <img src="https://i.pravatar.cc/64?img=12" alt="" class="avatar">
        <div class="me-meta">
          <strong>Lerato M.</strong>
          <span>@lerato_codes</span>
        </div>
        <svg viewBox="0 0 24 24" width="18" height="18" class="more-dots"><circle cx="5" cy="12" r="1.8" fill="currentColor"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><circle cx="19" cy="12" r="1.8" fill="currentColor"/></svg>
      </div>
    </div>
  </aside>

  <!-- MAIN COLUMN -->
  <main class="main">

    <!-- HOME VIEW -->
    <section class="view" id="view-home">
      <header class="main-header">
        <h1>Home</h1>
      </header>

      <div class="composer">
        <img src="https://i.pravatar.cc/48?img=12" alt="" class="avatar">
        <div class="composer-body">
          <textarea id="inlineComposeText" placeholder="What's chirping?" rows="2"></textarea>
          <div class="composer-actions">
            <div class="composer-icons">
              <button title="Media">🖼️</button>
              <button title="Poll">📊</button>
              <button title="Emoji">😊</button>
              <button title="Schedule">📅</button>
            </div>
            <button class="post-btn" id="inlinePostBtn" disabled>Chirp</button>
          </div>
        </div>
      </div>

      <div class="feed" id="feed"><!-- tweets injected by JS --></div>
    </section>

    <!-- EXPLORE VIEW -->
    <section class="view hidden" id="view-explore">
      <header class="main-header">
        <div class="explore-search">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M10 2a8 8 0 105.3 14L20 20.7l1.4-1.4-4.7-4.7A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
          <input type="text" id="exploreSearch" placeholder="Search chirp">
        </div>
      </header>
      <div class="explore-tabs">
        <button class="explore-tab active" data-cat="all">For you</button>
        <button class="explore-tab" data-cat="tech">Tech</button>
        <button class="explore-tab" data-cat="sport">Sport</button>
        <button class="explore-tab" data-cat="music">Music</button>
        <button class="explore-tab" data-cat="news">News</button>
      </div>
      <div class="trends-list" id="trendsList"><!-- trends injected by JS --></div>
    </section>

  </main>

  <!-- RIGHT SIDEBAR -->
  <aside class="right-sidebar">
    <div class="explore-search panel-search">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M10 2a8 8 0 105.3 14L20 20.7l1.4-1.4-4.7-4.7A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
      <input type="text" placeholder="Search chirp">
    </div>

    <div class="panel">
      <h2>Trending now</h2>
      <div class="panel-list" id="trendsPanel"></div>
      <a href="#" class="show-more" data-nav="explore">Show more</a>
    </div>

    <div class="panel">
      <h2>Who to follow</h2>
      <div class="panel-list" id="followPanel"></div>
      <a href="#" class="show-more">Show more</a>
    </div>

    <footer class="legal">chirp · a Twitter UI clone built for learning · 2026</footer>
  </aside>

</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="mobile-nav">
  <a href="#" class="mnav-item active" data-nav="home"><svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3l9-8z"/></svg></a>
  <a href="#" class="mnav-item" data-nav="explore"><svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 2a10 10 0 100 20 10 10 0 000-20zm3.5 6.5l-2 5.5-5.5 2 2-5.5z"/></svg></a>
  <a href="#" class="mnav-item" data-nav="notifications"><svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 2a6 6 0 00-6 6v3.6c0 .8-.3 1.5-.8 2.1L4 16h16l-1.2-2.3c-.5-.6-.8-1.3-.8-2.1V8a6 6 0 00-6-6zm0 20a2.5 2.5 0 002.5-2.5h-5A2.5 2.5 0 0012 22z"/></svg></a>
  <a href="#" class="mnav-item" data-nav="messages"><svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3 4h18a1 1 0 011 1v14a1 1 0 01-1 1H3a1 1 0 01-1-1V5a1 1 0 011-1zm1 2.4V18h16V6.4l-7.4 5.5a1 1 0 01-1.2 0L4 6.4z"/></svg></a>
  <button class="mnav-compose" id="mobileComposeBtn">+</button>
</nav>

<!-- COMPOSE MODAL (Cursor feature 1) -->
<div class="modal-overlay hidden" id="composeModalOverlay">
  <div class="modal" id="composeModal">
    <div class="modal-header">
      <button class="modal-close" id="closeComposeModal">✕</button>
    </div>
    <div class="modal-body">
      <img src="https://i.pravatar.cc/48?img=12" alt="" class="avatar">
      <div class="modal-compose-body">
        <textarea id="modalComposeText" placeholder="What's chirping?" rows="5" maxlength="280"></textarea>
        <div class="modal-footer">
          <div class="composer-icons">
            <button title="Media">🖼️</button>
            <button title="Poll">📊</button>
            <button title="Emoji">😊</button>
          </div>
          <div class="modal-footer-right">
            <span class="char-count" id="charCount">280</span>
            <button class="post-btn" id="modalPostBtn" disabled>Chirp</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast hidden" id="toast">Your chirp was sent ✦</div>

<script src="script.js"></script>
</body>
</html>
